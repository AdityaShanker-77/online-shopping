<div class="product-form-container">
    <div class="form-header">
        <h2>Add New Product</h2>
        <a routerLink="/retailer/dashboard" class="btn-3d btn-outline">Back to Dashboard</a>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

    <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="glass-form">
        <div class="form-group row">
            <div class="col">
                <label for="name">Product Name *</label>
                <input id="name" type="text" formControlName="name" class="form-control" />
            </div>
            <div class="col">
                <label for="categoryId">Category *</label>
                <select id="categoryId" formControlName="categoryId" class="form-control">
                    <option value="" disabled>Select a category</option>
                    <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
                </select>
            </div>
        </div>

        <div class="form-group row">
            <div class="col">
                <label for="price">Price ($) *</label>
                <input id="price" type="number" step="0.01" formControlName="price" class="form-control" />
            </div>
            <div class="col">
                <label for="stock">Inventory Stock *</label>
                <input id="stock" type="number" formControlName="stock" class="form-control" />
            </div>
        </div>

        <div class="form-group">
            <label for="imageUrl">Image URL (Optional)</label>
            <input id="imageUrl" type="text" formControlName="imageUrl" class="form-control"
                placeholder="https://example.com/image.png" />
        </div>

        <div class="form-group">
            <label for="description">Product Description</label>
            <textarea id="description" formControlName="description" class="form-control" rows="4"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-3d btn-primary btn-submit"
                [disabled]="productForm.invalid || isSubmitting || !retailerId">
                {{ isSubmitting ? 'Saving...' : 'Publish Product' }}
            </button>
        </div>
    </form>
</div>
