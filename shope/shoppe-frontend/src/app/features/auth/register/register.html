<div class="min-h-[calc(100vh-80px)] flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Interactive background blobs -->
    <div class="absolute top-1/4 right-1/4 w-96 h-96 bg-purple-500/20 rounded-full blur-[100px] -z-10 animate-blob">
    </div>
    <div
        class="absolute bottom-1/4 left-1/4 w-96 h-96 bg-blue-500/20 rounded-full blur-[100px] -z-10 animate-blob animation-delay-2000">
    </div>

    <div
        class="w-full max-w-5xl bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row-reverse">

        <!-- Right Side (now on left): Branding / Welcome -->
        <div
            class="md:w-5/12 p-10 flex flex-col justify-between relative overflow-hidden bg-gradient-to-bl from-purple-900/40 to-slate-900/80 border-l border-white/5">
            <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10">
            </div>

            <div class="relative z-10 flex flex-col gap-6 mt-8 text-right">
                <h1
                    class="text-4xl md:text-5xl font-black bg-gradient-to-r from-purple-400 to-blue-500 bg-clip-text text-transparent leading-tight">
                    Join<br>Shopp-E
                </h1>
                <p class="text-slate-400 text-lg leading-relaxed">
                    Create an account today to discover exclusive deals, track orders in real-time, or even start your
                    own retail store.
                </p>
            </div>

            <div class="relative z-10 mt-12 flex justify-end">
                <div class="flex items-center gap-4 text-sm text-slate-500 font-medium">
                    <lucide-icon name="users" class="w-5 h-5 text-purple-400"></lucide-icon> Join thousands of users
                </div>
            </div>
        </div>

        <!-- Left Side (now on right): Register Form -->
        <div class="md:w-7/12 p-10 md:p-14 flex flex-col justify-center bg-slate-900/30">
            <div class="mb-10 text-center md:text-left">
                <h2 class="text-3xl font-bold text-white mb-2 tracking-tight">Create Account</h2>
                <p class="text-slate-400 font-medium">Please fill in your details to sign up.</p>
            </div>

            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="flex flex-col gap-1.5 focus-within:text-purple-400 transition-colors duration-200">
                        <app-input id="name" type="text" label="Full Name" placeholder="John Doe" [required]="true"
                            [value]="f['name'].value" (valueChange)="f['name'].setValue($event)"
                            [error]="f['name'].touched && f['name'].invalid ? 'Name is required' : null"
                            customClasses="bg-white/[0.03] border-white/10 focus:bg-white/[0.05] focus:border-purple-500/50 py-3 transition-all shadow-inner">
                        </app-input>
                    </div>

                    <div class="flex flex-col gap-1.5 focus-within:text-blue-400 transition-colors duration-200">
                        <app-input id="email" type="email" label="Email Address" placeholder="name@example.com"
                            [required]="true" [value]="f['email'].value" (valueChange)="f['email'].setValue($event)"
                            [error]="f['email'].touched && f['email'].invalid ? 'Valid email is required' : null"
                            customClasses="bg-white/[0.03] border-white/10 focus:bg-white/[0.05] focus:border-blue-500/50 py-3 transition-all shadow-inner">
                        </app-input>
                    </div>
                </div>

                <div class="flex flex-col gap-1.5 focus-within:text-pink-400 transition-colors duration-200">
                    <app-input id="password" type="password" label="Password" placeholder="Minimum 6 characters"
                        [required]="true" [value]="f['password'].value" (valueChange)="f['password'].setValue($event)"
                        [error]="f['password'].touched && f['password'].invalid ? 'Password must be at least 6 characters' : null"
                        customClasses="bg-white/[0.03] border-white/10 focus:bg-white/[0.05] focus:border-pink-500/50 py-3 transition-all shadow-inner">
                    </app-input>
                </div>

                <div
                    class="flex flex-col gap-1.5 focus-within:text-emerald-400 transition-colors duration-200 relative">
                    <label for="role" class="text-sm font-semibold text-slate-300 ml-1 transition-colors">Account
                        Type</label>
                    <div class="relative">
                        <select id="role" formControlName="role"
                            class="w-full px-4 py-3 bg-white/[0.03] border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:bg-white/[0.05] focus:border-emerald-500/50 focus:ring-0 transition-all duration-300 backdrop-blur-sm shadow-inner appearance-none cursor-pointer font-medium">
                            <option value="USER" class="bg-slate-800 text-white">Customer Profile</option>
                            <option value="RETAILER" class="bg-slate-800 text-white">Retailer Profile</option>
                        </select>
                        <div class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                            <lucide-icon name="arrow-right" class="w-5 h-5 -rotate-90"></lucide-icon>
                        </div>
                    </div>
                </div>

                <app-button type="submit" size="full" [disabled]="registerForm.invalid" variant="secondary"
                    class="mt-6 transform hover:-translate-y-1 transition-transform shadow-lg hover:shadow-purple-500/25">
                    <span class="text-lg font-bold py-1">Register Account</span>
                    <lucide-icon name="arrow-right" class="w-5 h-5 ml-2"></lucide-icon>
                </app-button>
            </form>

            <div class="mt-10 pt-6 border-t border-white/10 text-center">
                <p class="text-slate-400 font-medium">Already have an account?
                    <a routerLink="/auth/login"
                        class="text-blue-400 hover:text-purple-400 font-black transition-colors ml-2 hover:underline decoration-2 underline-offset-4">Login
                        here</a>
                </p>
            </div>
        </div>
    </div>
</div>
