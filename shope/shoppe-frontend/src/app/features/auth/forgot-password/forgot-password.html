<div class="auth-container">
    <h2>Reset Your Password</h2>

    <div *ngIf="error" class="error-banner">{{ error }}</div>
    <div *ngIf="message && step !== 'email'" class="success-banner">{{ message }}</div>

    <!-- Step 1: Enter Email -->
    <form *ngIf="step === 'email'" (ngSubmit)="requestOtp()">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input id="email" type="email" class="form-control" [(ngModel)]="email" name="email"
                placeholder="Enter your registered email" required />
        </div>
        <button type="submit" class="btn-3d btn-primary" [disabled]="loading || !email">
            {{ loading ? 'Sending OTP...' : 'Send OTP' }}
        </button>
    </form>

    <!-- Step 2: Enter OTP + New Password -->
    <form *ngIf="step === 'otp'" (ngSubmit)="resetPassword()">
        <div class="form-group">
            <label for="otp">OTP Code</label>
            <input id="otp" type="text" class="form-control" [(ngModel)]="otp" name="otp"
                placeholder="Enter 6-digit OTP" required maxlength="6" />
        </div>
        <div class="form-group">
            <label for="newPassword">New Password</label>
            <input id="newPassword" type="password" class="form-control" [(ngModel)]="newPassword" name="newPassword"
                placeholder="Min 6 characters" required />
        </div>
        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password" class="form-control" [(ngModel)]="confirmPassword"
                name="confirmPassword" placeholder="Re-enter password" required />
        </div>
        <button type="submit" class="btn-3d btn-primary" [disabled]="loading || !otp || !newPassword">
            {{ loading ? 'Resetting...' : 'Reset Password' }}
        </button>
    </form>

    <!-- Step 3: Done! -->
    <div *ngIf="step === 'done'" class="success-state">
        <p>Your password has been successfully reset!</p>
        <a routerLink="/auth/login" class="btn-3d btn-primary" style="display: inline-block; text-decoration: none;">Go
            to Login</a>
    </div>

    <p class="mt-3" *ngIf="step !== 'done'"><a routerLink="/auth/login">Back to Login</a></p>
</div>
