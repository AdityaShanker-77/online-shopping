<div class="cart-container">
    <h2>Your Shopping Cart</h2>

    <div *ngIf="loading" class="loading">Loading cart items...</div>

    <div *ngIf="!loading && cartItems.length === 0" class="empty-state">
        <p>Your cart is empty.</p>
        <a routerLink="/products" class="btn-3d btn-primary">Continue Shopping</a>
    </div>

    <div *ngIf="!loading && cartItems.length > 0" class="cart-content">
        <div class="cart-items">
            <div class="cart-item" *ngFor="let item of cartItems">
                <div class="item-img">
                    <img *ngIf="item.imageUrl" [src]="item.imageUrl" [alt]="item.productName">
                    <div *ngIf="!item.imageUrl" class="img-placeholder">No Image</div>
                </div>

                <div class="item-details">
                    <h3>{{ item.productName }}</h3>
                    <p class="price">${{ item.price }}</p>
                </div>

                <div class="item-actions">
                    <div class="quantity-controls">
                        <button (click)="updateQuantity(item, -1)">-</button>
                        <span>{{ item.quantity }}</span>
                        <button (click)="updateQuantity(item, 1)">+</button>
                    </div>
                    <button class="btn-remove" (click)="removeItem(item.id)">Remove</button>
                </div>

                <div class="item-total">
                    ${{ item.price * item.quantity }}
                </div>
            </div>
        </div>

        <div class="cart-summary">
            <h3>Order Summary</h3>
            <div class="summary-row">
                <span>Subtotal ({{ cartItems.length }} items)</span>
                <span>${{ totalAmount }}</span>
            </div>
            <div class="summary-total">
                <span>Total</span>
                <span>${{ totalAmount }}</span>
            </div>
            <button class="btn-3d btn-primary btn-checkout" routerLink="/order/checkout">Proceed to Checkout</button>
        </div>
    </div>
</div>
