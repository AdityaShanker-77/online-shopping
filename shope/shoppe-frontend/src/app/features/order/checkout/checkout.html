<div class="checkout-container">
    <h2>Secure Checkout</h2>

    <div *ngIf="error" class="error-banner">{{ error }}</div>

    <div class="checkout-layout">
        <div class="checkout-form-container">
            <form [formGroup]="checkoutForm" (ngSubmit)="onSubmit()">

                <div class="form-section">
                    <h3>Shipping Information</h3>

                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input id="fullName" type="text" formControlName="fullName" class="form-control"
                            placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="address">Street Address</label>
                        <input id="address" type="text" formControlName="address" class="form-control"
                            placeholder="123 Main St">
                    </div>

                    <div class="form-row">
                        <div class="form-group half">
                            <label for="city">City</label>
                            <input id="city" type="text" formControlName="city" class="form-control"
                                placeholder="New York">
                        </div>
                        <div class="form-group half">
                            <label for="zipCode">ZIP Code</label>
                            <input id="zipCode" type="text" formControlName="zipCode" class="form-control"
                                placeholder="10001">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Payment Details</h3>

                    <div class="form-group">
                        <label for="cardNumber">Card Number</label>
                        <input id="cardNumber" type="text" formControlName="cardNumber" class="form-control"
                            placeholder="1234123412341234" maxlength="16">
                    </div>

                    <div class="form-row">
                        <div class="form-group half">
                            <label for="expiry">Expiry Date (MM/YY)</label>
                            <input id="expiry" type="text" formControlName="expiry" class="form-control"
                                placeholder="12/25" maxlength="5">
                        </div>
                        <div class="form-group half">
                            <label for="cvv">CVV</label>
                            <input id="cvv" type="text" formControlName="cvv" class="form-control" placeholder="123"
                                maxlength="4">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-submit"
                    [disabled]="checkoutForm.invalid || loading || cartTotal === 0">
                    {{ loading ? 'Processing...' : 'Place Order' }}
                </button>
            </form>
        </div>

        <div class="checkout-summary">
            <h3>Order Summary</h3>
            <div class="summary-total">
                <span>Amount to Pay</span>
                <span>${{ cartTotal }}</span>
            </div>
            <p class="summary-note">By placing your order, you agree to our privacy notice and conditions of use.</p>
        </div>
    </div>
</div>
