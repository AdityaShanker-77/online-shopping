<div *ngIf="isLoading" class="fixed top-0 left-0 w-full h-1 z-50 overflow-hidden bg-slate-800">
    <div
        class="h-full bg-gradient-to-r from-blue-500 via-pink-500 to-purple-500 animate-[loadingBar_1.5s_infinite_linear] origin-left w-1/2">
    </div>
</div>

<nav
    class="sticky top-0 z-40 w-full backdrop-blur-xl bg-slate-900/80 border-b border-white/10 shadow-lg px-6 py-4 transition-all">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-8">
            <a routerLink="/"
                class="text-2xl font-black bg-gradient-to-r from-blue-400 via-purple-400 to-pink-500 bg-clip-text text-transparent hover:scale-105 transition-transform tracking-tight">
                Shopp-E
            </a>

            <div class="hidden md:flex items-center gap-6">
                <a routerLink="/products"
                    class="text-slate-300 hover:text-white font-medium transition-colors border-b-2 border-transparent hover:border-pink-500 px-1 py-2"
                    routerLinkActive="text-white border-pink-500">Products</a>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex items-center gap-4" *ngIf="!currentUser">
                <a routerLink="/auth/login"
                    class="text-slate-300 hover:text-white font-semibold transition-colors">Login</a>
                <a routerLink="/auth/register"
                    class="px-5 py-2 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold rounded-xl shadow-[0_4px_15px_rgba(59,130,246,0.3)] hover:shadow-[0_8px_25px_rgba(59,130,246,0.5)] hover:-translate-y-0.5 transition-all">Sign
                    Up</a>
            </div>

            <div class="flex items-center gap-5" *ngIf="currentUser">
                <ng-container *ngIf="isCustomer">
                    <a routerLink="/order/compare"
                        class="text-slate-400 hover:text-white font-medium transition-colors p-2 hover:bg-white/5 rounded-lg"
                        routerLinkActive="text-white bg-white/10" title="Compare">
                        <lucide-icon name="arrow-left-right" class="w-5 h-5 block"></lucide-icon>
                    </a>
                    <a routerLink="/order/wishlist"
                        class="text-pink-400/80 hover:text-pink-400 font-medium transition-colors p-2 hover:bg-pink-500/10 rounded-lg"
                        routerLinkActive="text-pink-500 bg-pink-500/10" title="Wishlist">
                        <lucide-icon name="heart" class="w-5 h-5 block"></lucide-icon>
                    </a>
                    <a routerLink="/order/cart"
                        class="hidden md:flex text-blue-400 hover:text-blue-300 font-medium transition-colors items-center gap-2 p-2 hover:bg-blue-500/10 rounded-lg"
                        routerLinkActive="text-blue-500 bg-blue-500/10" title="Cart">
                        <lucide-icon name="shopping-cart" class="w-5 h-5"></lucide-icon>
                        <span class="font-bold text-sm">Cart</span>
                    </a>
                </ng-container>

                <div class="h-6 w-px bg-white/10 mx-1 hidden md:block"></div>

                <a routerLink="/profile"
                    class="hidden md:block text-slate-300 hover:text-white text-sm font-semibold transition-colors px-3 py-2 rounded-lg hover:bg-white/5"
                    routerLinkActive="text-white bg-white/10">Profile</a>

                <ng-container *ngIf="isAdmin">
                    <a routerLink="/admin/dashboard"
                        class="text-purple-400 hover:text-purple-300 text-sm font-semibold transition-colors px-3 py-2 rounded-lg hover:bg-purple-500/10"
                        routerLinkActive="text-purple-500 bg-purple-500/10">Admin</a>
                </ng-container>

                <ng-container *ngIf="isRetailer">
                    <a routerLink="/retailer/dashboard"
                        class="text-emerald-400 hover:text-emerald-300 text-sm font-semibold transition-colors px-3 py-2 rounded-lg hover:bg-emerald-500/10"
                        routerLinkActive="text-emerald-500 bg-emerald-500/10">Retail Store</a>
                </ng-container>

                <button (click)="logout()"
                    class="px-4 py-1.5 ml-1 border border-slate-600/50 text-slate-400 rounded-lg hover:bg-slate-800 hover:border-slate-500 hover:text-white transition-all text-sm font-bold">Logout</button>
            </div>
        </div>
    </div>
</nav>

<!-- Main Global Loading Overlay -->
<div *ngIf="isLoading"
    class="fixed inset-0 z-30 bg-slate-900/40 backdrop-blur-[2px] flex items-center justify-center transition-all duration-300 animate-in fade-in">
    <div
        class="bg-slate-900 border border-white/10 p-6 rounded-2xl shadow-2xl flex flex-col items-center gap-4 animate-in zoom-in-95 duration-300">
        <div class="relative w-12 h-12">
            <div class="absolute inset-0 rounded-full border-t-2 border-r-2 border-blue-500 animate-spin"></div>
            <div
                class="absolute inset-2 rounded-full border-b-2 border-l-2 border-pink-500 animate-[spin_1s_linear_infinite_reverse]">
            </div>
        </div>
        <span class="text-white font-medium text-sm animate-pulse tracking-wide">Loading...</span>
    </div>
</div>

<main class="main-content">
    <app-toast></app-toast>
    <router-outlet></router-outlet>
</main>
