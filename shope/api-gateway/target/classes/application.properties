spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.client.registry-fetch-interval-seconds=5
spring.cloud.loadbalancer.ribbon.enabled=false

# JWT secret (must match auth-service)
shoppe.jwt.secret=9B916BBAAECFDE6A5822FBEB667F5B6F5A29B12E7B357CCD4D1898748DA8C88B0

# Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=product-service
spring.cloud.gateway.routes[1].uri=lb://product-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**,/api/categories/**
spring.cloud.gateway.routes[1].filters[0]=Authentication

spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=lb://order-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**,/api/cart/**,/api/wishlist/**,/api/compare/**
spring.cloud.gateway.routes[2].filters[0]=Authentication

spring.cloud.gateway.routes[3].id=user-service
spring.cloud.gateway.routes[3].uri=lb://user-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[3].filters[0]=Authentication

spring.cloud.gateway.routes[4].id=retailer-service
spring.cloud.gateway.routes[4].uri=lb://retailer-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/retailers/**
spring.cloud.gateway.routes[4].filters[0]=Authentication

# CORS is handled by CorsConfig.java bean (CorsWebFilter)
